# ── Local development profile ─────────────────────────────────────────────────
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
# Uses H2 in-memory DB so you don't need a local PostgreSQL instance.

spring.datasource.url=jdbc:h2:mem:summarizer;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Placeholders — override with real values in your shell or a .env file
claude.api.key=YOUR_CLAUDE_API_KEY_HERE
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-opus-4-6
lemonsqueezy.webhook.secret=dev-secret
app.free-tier.monthly-limit=20
