# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (Railway injects these as env vars) ──────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create-drop for local dev; change to validate or none before Railway deploy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Anthropic Claude API ──────────────────────────────────────────────────────
claude.api.key=${LLM_API_KEY}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-opus-4-6

# ── Lemon Squeezy ─────────────────────────────────────────────────────────────
lemonsqueezy.webhook.secret=${LEMON_SQUEEZY_WEBHOOK_SECRET}

# ── Free tier limit ───────────────────────────────────────────────────────────
app.free-tier.monthly-limit=20
